 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Книжный Советник - Демо</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .form-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 16px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .results {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .results h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .book-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .book-card:hover {
            transform: translateY(-5px);
        }
        
        .book-cover {
            width: 100%;
            height: 350px;
            object-fit: cover;
            background: #e0e0e0;
        }
        
        .book-info {
            padding: 20px;
        }
        
        .book-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .book-author {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .book-rating {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .rating-value {
            font-size: 24px;
            font-weight: bold;
            color: #f39c12;
        }
        
        .rating-label {
            color: #999;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .stats {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }
        
        .stats strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Книжный Советник</h1>
            <p>Система рекомендаций книг на основе машинного обучения</p>
        </div>
        
        <div class="form-section">
            <div class="form-group">
                <label for="userId">ID пользователя:</label>
                <input type="number" id="userId" placeholder="Например: 11676, 98391, 189835" value="11676">
            </div>
            
            <div class="form-group">
                <label for="limit">Количество рекомендаций:</label>
                <input type="number" id="limit" placeholder="5-10" value="5" min="1" max="20">
            </div>
            
            <button class="btn" onclick="getRecommendations()">Получить рекомендации</button>
            
            <div class="stats">
                <strong>Подсказка:</strong> Популярные пользователи: 
                <a href="#" onclick="setUser(11676); return false;">11676</a> (6943 оценки), 
                <a href="#" onclick="setUser(98391); return false;">98391</a> (5691 оценка), 
                <a href="#" onclick="setUser(189835); return false;">189835</a> (1899 оценок)
            </div>
            
            <div class="error" id="error"></div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Генерируем персональные рекомендации...</p>
        </div>
        
        <div class="results" id="results">
            <h2>Рекомендации для пользователя <span id="userIdDisplay"></span></h2>
            <div class="books-grid" id="booksGrid"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        const API_KEY = 'secret-ml-api-key-2024';
        
        function setUser(id) {
            document.getElementById('userId').value = id;
        }
        
        async function getRecommendations() {
            const userId = document.getElementById('userId').value;
            const limit = document.getElementById('limit').value;
            
            if (!userId || userId <= 0) {
                showError('Введите корректный ID пользователя');
                return;
            }
            
            // Скрываем результаты, показываем загрузку
            document.getElementById('results').classList.remove('show');
            document.getElementById('loading').classList.add('show');
            document.getElementById('error').classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/api/v1/recommend`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        limit: parseInt(limit)
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }
                
                const data = await response.json();
                displayResults(data, userId);
                
            } catch (error) {
                showError(`Ошибка: ${error.message}`);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        function displayResults(books, userId) {
            document.getElementById('userIdDisplay').textContent = userId;
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = '';
            
            if (books.length === 0) {
                grid.innerHTML = '<p>Рекомендации не найдены</p>';
                document.getElementById('results').classList.add('show');
                return;
            }
            
            books.forEach((book, index) => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                // Используем обложку если есть, иначе заглушка
                const coverUrl = book.image_url || `https://via.placeholder.com/250x350/667eea/ffffff?text=${encodeURIComponent(book.title.substring(0, 20))}`;
                
                card.innerHTML = `
                    <img src="${coverUrl}" alt="${book.title}" class="book-cover" onerror="this.src='https://via.placeholder.com/250x350/cccccc/666666?text=No+Cover'">
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">${book.author}</div>
                        <div class="book-rating">
                            <span class="rating-value">${book.predicted_rating}</span>
                            <span class="rating-label">из 10</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
            
            document.getElementById('results').classList.add('show');
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        // Загружаем рекомендации при загрузке страницы для первого пользователя
        window.onload = function() {
            // Можно раскомментировать для автозагрузки
            // getRecommendations();
        };
    </script>
</body>
</html>
